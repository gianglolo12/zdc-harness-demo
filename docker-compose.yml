# ZDC Harness — Dokploy / docker-compose deployment.
# server (webhook) + worker (job processor) + redis. See docs/deployment-guide.md.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  server:
    build: .
    restart: unless-stopped
    command: node dist/start-server.js
    environment:
      - REDIS_URL=redis://redis:6379
      - GITLAB_TOKEN=${GITLAB_TOKEN}
      - GITLAB_URL=${GITLAB_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - PORT=3000
      - DRY_RUN=${DRY_RUN:-1}
      - GIT_PROVIDER=${GIT_PROVIDER:-gitlab}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
    # No host port binding (avoids host :3000 conflicts on shared Dokploy VPS).
    # Expose 3000 on the compose network; route public traffic via a Dokploy Domain (Traefik) → port 3000.
    expose:
      - "3000"
    depends_on:
      - redis

  worker:
    build: .
    restart: unless-stopped
    command: node dist/start-worker.js
    environment:
      - REDIS_URL=redis://redis:6379
      - GITLAB_TOKEN=${GITLAB_TOKEN}
      - GITLAB_URL=${GITLAB_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GITLAB_PROJECT_ID=${GITLAB_PROJECT_ID}
      - CONTROL_PLANE_DIR=/app/examples/control-plane
      - SQLITE_MEMORY_DB=/data/memory.sqlite
      - DRY_RUN=${DRY_RUN:-1}
      - HARNESS_PAUSED=${HARNESS_PAUSED:-0}
      - GIT_PROVIDER=${GIT_PROVIDER:-gitlab}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_OWNER=${GITHUB_OWNER}
      - GITHUB_REPO=${GITHUB_REPO}
    volumes:
      - memory-data:/data
      - control-plane:/control-plane
      # Claude subscription auth (claude -p). Populate once via Open Terminal:
      #   claude   → /login (subscription). Credentials persist in this volume.
      - claude-auth:/root/.claude
    depends_on:
      - redis

volumes:
  redis-data: {}
  memory-data: {}
  control-plane: {}
  claude-auth: {}
